<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المصور علي الشمري</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      background: linear-gradient(90deg, red, blue, green, purple);
      animation: rgbMove 5s infinite linear;
      background-size: 400%;
    }

    @keyframes rgbMove {
      0% {background-position: 0%}
      100% {background-position: 400%}
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #111;
      padding: 10px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255,0,255,0.5);
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, red, blue);
      color: white;
      cursor: pointer;
    }

    .admin {
      padding: 20px;
      background: #222;
      margin: 20px;
      border-radius: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      border: none;
    }
  </style></head>
<body><header>
  المصور علي الشمري 🎥
</header><div style="text-align:center; margin-top:20px;">
  <button onclick="login()">تسجيل دخول گوگل</button>
</div><div class="admin">
  <h3>لوحة التحكم</h3>
  <input type="text" id="videoUrl" placeholder="رابط الفيديو (YouTube Embed)">
  <button onclick="addVideo()">إضافة فيديو</button>
</div><div class="videos" id="videos"></div><script>
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  }

  function addVideo() {
    const url = document.getElementById('videoUrl').value;
    db.collection('videos').add({ url });
  }

  function loadVideos() {
    db.collection('videos').onSnapshot(snapshot => {
      const container = document.getElementById('videos');
      container.innerHTML = '';
      snapshot.forEach(doc => {
        const data = doc.data();
        container.innerHTML += `
          <div class="card">
            <iframe src="${data.url}" allowfullscreen></iframe>
            <button onclick="like()">❤️ لايك</button>
          </div>
        `;
      });
    });
  }

  loadVideos();
</script></body>
</html>
